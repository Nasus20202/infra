cluster:
  name: compute-k8s

destinations:
  loki:
    type: loki
    url: http://loki:3100/loki/api/v1/push
  prometheus:
    type: prometheus
    url: http://prometheus-kube-prometheus-prometheus:9090/api/v1/write

clusterEvents:
  enabled: true
  collector: alloy-logs

nodeLogs:
  enabled: true
  collector: alloy-logs

podLogsViaLoki:
  enabled: true
  collector: alloy-logs

applicationObservability:
  enabled: false

autoInstrumentation:
  enabled: false

# Collectors
collectors:
  alloy-logs:
    # filesystem-log-reader enables varlog filesystem access (equivalent to mounts.varlog: true in v3)
    # daemonset deploys one collector instance per node
    presets: [filesystem-log-reader, daemonset]
    alloy:
      resources:
        requests:
          cpu: 30m
          memory: 150Mi
        limits:
          memory: 300Mi

alloy-operator:
  resources:
    requests:
      cpu: 20m
      memory: 50Mi
    limits:
      memory: 100Mi
